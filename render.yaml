# Render Blueprint — https://render.com/docs/blueprint-spec
# Create from the Render dashboard: New → Blueprint → connect this repo.
# Render reads this file, then prompts for the `sync: false` secret values.
#
# Mongo is NOT provisioned here — Render has no managed MongoDB. Use MongoDB
# Atlas (free tier) and paste its connection string as MONGO_URI.

services:
  - type: web
    name: provinyl-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      # Render injects PORT automatically; the app reads it.
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 30d
      # Render generates a strong value (>32 chars) on first deploy.
      - key: JWT_SECRET
        generateValue: true
      # Secrets / environment-specific — set these in the dashboard:
      - key: MONGO_URI # mongodb+srv://...  (MongoDB Atlas)
        sync: false
      - key: DISCOGS_CONSUMER_KEY
        sync: false
      - key: DISCOGS_CONSUMER_SECRET
        sync: false
      # Prod uses a custom domain so the SPA and API are same-site (both under
      # provinyl.io) — required for Safari, which blocks cross-site cookies that
      # *.onrender.com subdomains would be (they're cross-site per the PSL).
      - key: DISCOGS_CALLBACK_URL # https://api.provinyl.io/api/v1/auth/callback (must match the Discogs app)
        sync: false
      - key: CLIENT_ORIGIN # https://provinyl.io  (the deployed provinyl-web origin)
        sync: false
      - key: TOKEN_ENC_KEY # openssl rand -hex 32
        sync: false
      # Object storage for custom item images (Cloudflare R2 / S3-compatible).
      # All optional — leave unset to disable photos (endpoints return 503).
      # Set these in the Render dashboard; add a bucket CORS rule allowing
      # GET/PUT from CLIENT_ORIGIN so the web app can upload directly.
      - key: R2_ENDPOINT # https://<account-id>.r2.cloudflarestorage.com
        sync: false
      - key: R2_BUCKET # provinyl-photos
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_REGION # auto (for R2)
        sync: false
